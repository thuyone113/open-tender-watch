    methodology:
      heading: "Metodologia"
      subheading: "Como são determinados os scores de risco e o que significa cada indicador"
      approach_label: "ABORDAGEM"
      track_a: "PISTA A — INDICADORES BASEADOS EM REGRAS"
      track_b: "PISTA B — INDICADORES ESTATÍSTICOS"
      track_c: "PISTA C — INTEGRIDADE E CONFORMIDADE"
      primary_refs: "REFERÊNCIAS PRIMÁRIAS"
      approach_p1: "Os indicadores de risco seguem o enquadramento da OCDE para deteção de corrupção e conluio na contratação pública. Cada indicador é pontuado de forma independente e tem um nível de confiança associado — o score degrada quando campos essenciais (NIF, CPV, preço, datas) estão em falta."
      approach_p2: "O sistema destaca casos para auditoria e investigação jornalística. Não produz conclusões. Todos os resultados devem ser tratados como pistas, não como achados."
      track_b_note: "B5 (Lei de Benford) ativo — análise ao nível da entidade. B1–B4 em desenvolvimento — necessitam de volume de dados mínimo de 2 anos."
      disclaimer: "Os scores de risco refletem anomalias estruturais nos dados de contratação. Dados em falta ou inconsistentes são, por si só, um sinal de risco — podem indicar evasão. A ausência de um indicador não significa que o contrato seja irregular."
      flags:
        a1_title: "Ajuste direto repetido"
        a1_desc: "A mesma entidade adjudica diretamente ao mesmo fornecedor em 36 meses"
        a2_title: "Publicação posterior à celebração"
        a2_desc: "Contrato publicado no BASE após a data de assinatura"
        a3_title: "Execução antes da publicação"
        a3_desc: "A execução começa antes de o contrato ser publicado"
        a4_title: "Inflação por modificação"
        a4_desc: "Modificações contratuais grandes ou frequentes que inflacionam o valor original"
        a5_title: "Fracionamento de limiares"
        a5_desc: "Valor do contrato imediatamente abaixo dos limiares procedimentais (€5K / €20K / €75K / €150K)"
        a6_title: "Concorrente único"
        a6_desc: "Apenas um concorrente participou num procedimento competitivo"
        a7_title: "Taxa anormal de ajuste direto"
        a7_desc: "Entidade usa ajuste direto acima da mediana dos pares para o mesmo CPV"
        a8_title: "Execução prolongada"
        a8_desc: "Duração de execução superior a 3 anos"
        a9_title: "Anomalia de preço"
        a9_desc: "Preço final efetivo significativamente acima da estimativa base — sugere suborçamentação para evitar limiares procedimentais ou inflação de âmbito posterior. Um desvio descendente (efetivo muito abaixo do base) pode indicar proposta predatória ou erro de introdução de dados."
        b1_title: "Rotação de propostas"
        b1_desc: "Fornecedores raramente concorrem exceto com uma entidade (análise de grafo)"
        b2_title: "Concentração de fornecedores"
        b2_desc: "Índice tipo Herfindahl — um fornecedor domina a despesa de uma entidade"
        b3_title: "Preço invulgar"
        b3_desc: "Z-score do preço discrepante no grupo de pares CPV × região × ano"
        b4_title: "Mudança procedimental"
        b4_desc: "Alteração súbita na distribuição de tipos de procedimento próximo de prazos orçamentais"
        b5_title: "Desvio da Lei de Benford"
        b5_desc: "Valores contratuais da entidade desviam-se da distribuição esperada de Benford por algarismo inicial (qui-quadrado p<0,05)"
        b5_detail: "A Lei de Benford estabelece que em conjuntos de dados naturais o dígito '1' lidera cerca de 30% dos valores, '2' cerca de 18%, e assim sucessivamente — uma distribuição logarítmica. Valores contratuais fabricados, arredondados para contornar limiares ou sistematicamente fracionados tendem a produzir uma distribuição de dígitos plana ou irregular."
        b5_how: "Aplicado ao nível da entidade: todos os preços base atribuídos a uma entidade são agrupados. Um teste qui-quadrado de ajustamento à distribuição de Benford é efetuado sobre os algarismos iniciais. Um valor p inferior a 0,05 ou um qui-quadrado acima do valor crítico ativa o indicador. Entidades com menos de 30 contratos são excluídas para evitar resultados espúrios em populações pequenas."
        c1_title: "NIF do fornecedor em falta"
        c1_desc: "Identificador fiscal ausente ou inválido — sinal de completude de dados OCDE"
        c2_title: "Sequência de datas impossível"
        c2_desc: "Campos de data fora de ordem ou de intervalos plausíveis"
        c3_title: "Campos obrigatórios em falta"
        c3_desc: "CPV, localização ou preço base ausentes para o tipo de procedimento"
        c4_title: "Sobreposição com sanções AdC"
        c4_desc: "NIF do fornecedor corresponde a um caso de cartel da Autoridade da Concorrência"
        c5_title: "Variação do nome da entidade"
        c5_desc: "O mesmo NIF aparece com múltiplas variantes de nome — potencial dissimulação"

